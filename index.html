<html lang="en">
<head>

<title>Muse 博悟</title>

</head>
<body>

    <g id="ic-standard" fill="none"><rect x="3" y="4" width="18" height="12" rx="1"/><rect x="6" y="7" width="4" height="6" rx="0.5"/><rect x="11" y="7" width="4" height="6" rx="0.5"/><rect x="8" y="16" width="2" height="6"/><rect x="14" y="16" width="2" height="6"/><path d="M3 5h18"/></g>

    <g id="ic-ai"><rect x="3" y="6" width="18" height="12" rx="3"/><circle cx="8" cy="11" r="1.5"/><circle cx="16" cy="11" r="1.5"/><line x1="9" y1="15" x2="15" y2="15"/></g>
    <g id="ic-user"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4.4 3.6-8 8-8s8 3.6 8 8"/></g>
    <g id="ic-lock"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></g>
    <g id="ic-book"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></g>
    <g id="ic-ach-chat"><path d="M21 15a2 2 0 0 1-2 2H9l-4 4V5a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2z"/><circle cx="9" cy="9" r="1"/><circle cx="13" cy="9" r="1"/><circle cx="11" cy="14" r="1"/></g>
    <g id="ic-ach-think"><circle cx="12" cy="12" r="9"/><path d="M9 10a3 3 0 0 1 5 1c0 2-3 2-3 4"/><circle cx="12" cy="17" r="1"/></g>
    <g id="ic-ach-books"><path d="M4 6h16v14H4z"/><path d="M4 6h16v14H4z" transform="translate(3,-3)"/></g>

    <g id="ic-spinner"><circle cx="12" cy="12" r="10" stroke-dasharray="32 32" stroke-dashoffset="0"><animateTransform attributeName="transform" type="rotate" from="0 12 12" to="360 12 12" dur="1.5s" repeatCount="indefinite"/></circle></g>

<!-- Loading Screen -->
<div id="loading">
  <div class="l-ring-outer"><div class="l-ring-inner"><svg class="icon-svg icon-2xl" viewBox="0 0 24 24"><use href="#ic-british"/></svg></div></div>
  <div class="l-title">MUSE</div>
  <div class="l-sub">The Muse</div>
</div>

<!-- Museum Selector -->
<div id="museum-selector">
  <div id="lectorInner"></div>
</div>

<!-- Header -->
<div id="header">
  <div class="h-left"><span class="h-logo">MUSE</span><span id="headerMuseum">Muse</span></div>
  <div class="h-right">
    <button class="h-btn" onclick="switchLang('en')">EN</button>
    <button class="h-btn" onclick="switchLang('zh')">中</button>
  </div>
</div>

<!-- App Container -->
<div id="app">
  <!-- Discover -->
  <div id="tab-discover" class="tab-pane active" style="padding:20px;overflow-y:auto"></div>

  <!-- Chat -->
  <div id="tab-chat" class="tab-pane"></div>

  <!-- Collection -->
  <div id="tab-collection" class="tab-pane" style="padding:20px;overflow-y:auto"></div>

  <!-- Story -->
  <div id="tab-story" class="tab-pane" style="padding:20px;overflow-y:auto"></div>

  <!-- Profile -->
  <div id="tab-profile" class="tab-pane" style="padding:20px;overflow-y:auto"></div>
</div>

<!-- Tab Bar -->
<div id="tab-bar">
  <button class="tab-item active" data-tab="discover"><svg class="icon-svg" viewBox="0 0 24 24"><use href="#ic-discover"/></svg><span class="tab-label">Discover</span></button>
  <button class="tab-item" data-tab="chat"><svg class="icon-svg" viewBox="0 0 24 24"><use href="#ic-chat"/></svg><span class="tab-label">Chat</span></button>
  <button class="tab-item" data-tab="collection"><svg class="icon-svg" viewBox="0 0 24 24"><use href="#ic-codex"/></svg><span class="tab-label">Codex</span></button>
  <button class="tab-item" data-tab="story"><svg class="icon-svg" viewBox="0 0 24 24"><use href="#ic-story"/></svg><span class="tab-label">Story</span></button>
  <button class="tab-item" data-tab="profile"><svg class="icon-svg" viewBox="0 0 24 24"><use href="#ic-profile"/></svg><span class="tab-label">Profile</span></button>
</div>

<!-- Achievement Popup -->
<div id="ach-popup"><div class="ap-icon"></div><div class="ap-title"></div><div class="ap-sub"></div></div>

<!-- Level Up -->
<div id="level-up"><div class="level-up-icon">&#9733;</div><div class="level-up-text"></div></div>

<!-- Guide Modal -->
<div id="guide-modal" class="guide-overlay">
  <div class="guide-card">
    <div class="guide-header">
      <div class="guide-header-left">
        <div class="guide-icon" id="guide-icon"></div>
        <div class="guide-title" id="guide-name"></div>
      </div>
      <button class="guide-close" onclick="closeGuideModal()">&times;</button>
    </div>
    <div class="guide-tabs">
      <button class="guide-tab-btn" data-guide-tab="official" onclick="switchGuideTab('official')">Official</button>
      <button class="guide-tab-btn" data-guide-tab="appreciate" onclick="switchGuideTab('appreciate')">Guide</button>
    </div>
    <div class="guide-panels">
      <div id="guide-panel-official" class="guide-tab-panel active"></div>
      <div id="guide-panel-appreciate" class="guide-tab-panel"></div>
    </div>
  </div>
</div>

<!-- Settings Modal -->
<div id="settings-modal" class="modal-overlay">
  <div class="modal-inner">
    <div class="modal-title">Settings</div>
    <div style="margin-top:16px"><button onclick="resetProgress()" style="padding:8px 18px;border-radius:12px;border:1px solid #ff6b6b;background:transparent;color:#ff6b6b;font-size:12px;cursor:pointer">Reset Progress</button></div>
    <button class="modal-close" onclick="toggleModal('settings-modal')">Close</button>
  </div>
</div>

<!-- Achievements Modal -->
<div id="ach-modal" class="modal-overlay">
  <div class="modal-inner">
    <div class="modal-title">Achievements</div>
    <div id="ach-list" style="max-height:50vh;overflow-y:auto;margin:12px 0"></div>
    <button class="modal-close" onclick="toggleModal('ach-modal')">Close</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
